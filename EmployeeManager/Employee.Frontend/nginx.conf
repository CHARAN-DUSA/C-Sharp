server {
    listen 80;

    # Serve Angular files from this folder
    root /usr/share/nginx/html;
    index index.html;

    # ─────────────────────────────────────────────
    # This is CRITICAL for Angular routing
    # Without this, refreshing any page gives 404
    # Example: refreshing localhost:4200/employees
    # would break without this line
    # ─────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ─────────────────────────────────────────────
    # Forward all /api/ calls to the .NET backend
    # 'dotnet-api' is the service name in docker-compose
    # So Angular never needs to know the API's real URL
    # ─────────────────────────────────────────────
    location /api/ {
        proxy_pass http://dotnet-api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}