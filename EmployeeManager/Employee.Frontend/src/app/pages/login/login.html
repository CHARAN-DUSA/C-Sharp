<app-toast></app-toast>

<div class="parent">
  <div class="login-card">
    <div class="login-logo">
      <i class="fas fa-user-shield"></i>
    </div>
    <h3 class="text-center mb-1">Welcome Back</h3>
    <p class="text-center text-muted mb-4" style="font-size:13px">Sign in to your account</p>

    <div class="mb-3">
      <label class="form-label">Email</label>
      <input type="email" [(ngModel)]="loginObj.email" name="email"
        class="form-control" placeholder="Enter email"/>
    </div>

    <div class="mb-4">
      <label class="form-label">Password</label>
      <input type="password" [(ngModel)]="loginObj.contactNo" name="password"
        class="form-control" placeholder="Enter password"/>
    </div>

    <button class="btn btn-custom w-100" (click)="onLogin()"
      [disabled]="isLoading()">
      @if (isLoading()) {
        <span class="spinner-border spinner-border-sm me-2"></span> Signing in...
      } @else {
        Sign In
      }
    </button>
  </div>
</div>
