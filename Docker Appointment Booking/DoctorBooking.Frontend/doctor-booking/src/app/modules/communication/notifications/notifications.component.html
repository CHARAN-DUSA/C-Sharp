<app-navbar></app-navbar>
<div style="padding-top:var(--mb-navbar-height);display:flex">
  <app-sidebar></app-sidebar>
  <main class="main-content">
    <div class="page-header d-flex justify-content-between align-items-center flex-wrap gap-2">
      <div><h2><i class="bi bi-bell text-primary me-2"></i>Notifications</h2><p>{{ unreadCount }} unread</p></div>
      <button *ngIf="unreadCount > 0" class="btn btn-outline-primary btn-sm fw-semibold" (click)="markAllRead()"><i class="bi bi-check2-all me-1"></i>Mark All Read</button>
    </div>
    <div *ngIf="loading()" class="text-center py-5"><div class="spinner-border text-primary" style="width:3rem;height:3rem"></div></div>
    <div class="card border-0 shadow-sm" style="border-radius:12px" *ngIf="!loading()">
      <div *ngIf="notifications().length === 0" class="text-center py-5 text-muted"><i class="bi bi-bell-slash" style="font-size:3rem"></i><p class="mt-2">No notifications yet</p></div>
      <div *ngFor="let n of notifications()" class="notification-item d-flex align-items-start gap-3" [class.unread]="!n.isRead" (click)="markRead(n)">
        <div [class.notif-dot]="!n.isRead" style="margin-top:6px;flex-shrink:0;width:8px"></div>
        <div style="width:40px;height:40px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center" [style.background]="n.type==='Appointment' ? '#eff6ff' : n.type==='Message' ? '#f0fdf4' : '#fef3c7'">
          <i [class]="'bi ' + (n.type==='Appointment' ? 'bi-calendar2-check text-primary' : n.type==='Message' ? 'bi-chat-dots text-success' : 'bi-bell text-warning')"></i>
        </div>
        <div class="flex-grow-1"><div class="d-flex justify-content-between align-items-start"><span class="fw-semibold">{{ n.title }}</span><span class="text-muted" style="font-size:.72rem;flex-shrink:0;margin-left:.5rem">{{ n.createdAt | timeAgo }}</span></div><p class="text-muted small mb-0">{{ n.message }}</p></div>
      </div>
    </div>
  </main>
</div>
