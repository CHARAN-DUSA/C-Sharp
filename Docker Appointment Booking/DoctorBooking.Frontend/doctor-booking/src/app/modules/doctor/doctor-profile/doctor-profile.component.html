<app-navbar></app-navbar>
<div style="padding-top:var(--mb-navbar-height);display:flex">
  <app-sidebar></app-sidebar>
  <main class="main-content">
    <div class="page-header"><h2><i class="bi bi-person-badge text-primary me-2"></i>Doctor Profile</h2><p>Update your professional information</p></div>
    <div class="row g-4">
      <div class="col-lg-4"><div class="card border-0 shadow-sm p-4 text-center" style="border-radius:16px"><div class="mx-auto mb-3" style="width:100px;height:100px;border-radius:50%;background:#dcfce7;display:flex;align-items:center;justify-content:center"><i class="bi bi-person-badge text-success" style="font-size:3.5rem"></i></div><h5 class="fw-bold">Dr. {{ auth.currentUser()?.fullName }}</h5><span class="role-badge doctor">Doctor</span><div class="text-muted small mt-2">{{ auth.currentUser()?.email }}</div></div></div>
      <div class="col-lg-8"><div class="card border-0 shadow-sm p-4" style="border-radius:16px">
        <h6 class="fw-bold mb-4"><i class="bi bi-pencil me-2 text-primary"></i>Professional Information</h6>
        <form [formGroup]="form" (ngSubmit)="save()">
          <div class="row g-3">
            <div class="col-12"><label class="form-label fw-semibold">Bio</label><textarea class="form-control" formControlName="bio" rows="3" placeholder="Tell patients about yourself..."></textarea></div>
            <div class="col-md-6"><label class="form-label fw-semibold">Consultation Fee (₹)</label><input type="number" class="form-control" formControlName="consultationFee"></div>
            <div class="col-md-6"><label class="form-label fw-semibold">Languages</label><input type="text" class="form-control" formControlName="languages" placeholder="English, Hindi..."></div>
            <div class="col-md-6"><label class="form-label fw-semibold">Clinic Name</label><input type="text" class="form-control" formControlName="clinicName"></div>
            <div class="col-md-6"><label class="form-label fw-semibold">Address</label><input type="text" class="form-control" formControlName="address"></div>
          </div>
          <div *ngIf="saved()" class="alert alert-success py-2 mt-3" style="border-radius:8px"><i class="bi bi-check-circle me-2"></i>Profile updated.</div>
          <button type="submit" class="btn btn-primary mt-3 px-4 fw-semibold" [disabled]="saving()"><span *ngIf="saving()" class="spinner-border spinner-border-sm me-2"></span>{{ saving() ? 'Saving...' : 'Save Changes' }}</button>
        </form>
      </div></div>
    </div>
  </main>
</div>
