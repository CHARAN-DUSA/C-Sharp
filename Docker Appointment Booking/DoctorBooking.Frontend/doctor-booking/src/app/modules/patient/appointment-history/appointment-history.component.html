<app-navbar></app-navbar>
<div style="padding-top:var(--mb-navbar-height);display:flex">
  <app-sidebar></app-sidebar>
  <main class="main-content">
    <div class="page-header"><h2><i class="bi bi-clock-history text-primary me-2"></i>Appointment History</h2><p>Your completed and past appointments</p></div>
    <div *ngIf="loading()" class="text-center py-5"><div class="spinner-border text-primary" style="width:3rem;height:3rem"></div></div>
    <div *ngIf="!loading() && appointments().length === 0" class="text-center py-5"><i class="bi bi-calendar-x text-muted" style="font-size:3.5rem"></i><h5 class="mt-3 text-muted">No history yet</h5></div>
    <div class="card border-0 shadow-sm" style="border-radius:12px" *ngIf="!loading() && appointments().length > 0">
      <div class="table-responsive"><table class="table table-hover mb-0">
        <thead class="table-light"><tr><th>Doctor</th><th>Specialty</th><th>Date</th><th>Time</th><th>Status</th><th>Fee</th><th>Actions</th></tr></thead>
        <tbody>
          <tr *ngFor="let a of appointments()">
            <td class="fw-semibold">Dr. {{ a.doctorName }}</td>
            <td><span class="specialty-badge">{{ a.doctorSpecialty }}</span></td>
            <td>{{ a.appointmentDate | date:'MMM dd, yyyy' }}</td>
            <td>{{ a.timeSlot }}</td>
            <td><span class="badge rounded-pill" [class]="a.statusText==='Completed' ? 'bg-success' : a.statusText==='Cancelled' ? 'bg-danger' : 'bg-secondary'">{{ a.statusText }}</span></td>
            <td class="fw-semibold text-primary">₹{{ a.consultationFee }}</td>
            <td><a *ngIf="a.statusText==='Completed'" routerLink="/reviews" class="btn btn-outline-warning btn-sm fw-semibold"><i class="bi bi-star me-1"></i>Review</a></td>
          </tr>
        </tbody>
      </table></div>
    </div>
  </main>
</div>
