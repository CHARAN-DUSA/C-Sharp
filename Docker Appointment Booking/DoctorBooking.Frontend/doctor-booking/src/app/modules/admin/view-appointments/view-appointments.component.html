<app-navbar></app-navbar>
<div style="padding-top:var(--mb-navbar-height);display:flex">
  <app-sidebar></app-sidebar>
  <main class="main-content">
    <div class="page-header d-flex justify-content-between align-items-start flex-wrap gap-3">
      <div><h2><i class="bi bi-calendar2 text-primary me-2"></i>All Appointments</h2><p>{{ total() }} total</p></div>
      <div class="d-flex gap-2 flex-wrap">
        <select class="form-select form-select-sm" style="width:160px" [(ngModel)]="statusFilter" (change)="load()"><option value="">All Status</option><option>Pending</option><option>Confirmed</option><option>Completed</option><option>Cancelled</option></select>
        <input type="date" class="form-control form-control-sm" style="width:160px" [(ngModel)]="dateFilter" (change)="load()">
      </div>
    </div>
    <div *ngIf="loading()" class="text-center py-5"><div class="spinner-border text-primary" style="width:3rem;height:3rem"></div></div>
    <div class="card border-0 shadow-sm" style="border-radius:12px" *ngIf="!loading()">
      <div class="table-responsive"><table class="table table-hover mb-0">
        <thead class="table-light"><tr><th>Patient</th><th>Doctor</th><th>Date</th><th>Time</th><th>Status</th><th>Fee</th></tr></thead>
        <tbody>
          <tr *ngFor="let a of appointments()">
            <td class="fw-semibold">{{ a.patientName }}</td><td>Dr. {{ a.doctorName }}</td>
            <td>{{ a.appointmentDate | date:'MMM dd, yyyy' }}</td><td>{{ a.timeSlot }}</td>
            <td><span class="badge rounded-pill" [class]="a.statusText==='Confirmed' ? 'bg-primary' : a.statusText==='Completed' ? 'bg-success' : a.statusText==='Cancelled' ? 'bg-danger' : 'bg-warning text-dark'">{{ a.statusText }}</span></td>
            <td>₹{{ a.consultationFee }}</td>
          </tr>
          <tr *ngIf="appointments().length === 0"><td colspan="6" class="text-center text-muted py-4">No appointments found.</td></tr>
        </tbody>
      </table></div>
      <div *ngIf="totalPages > 1" class="d-flex justify-content-between align-items-center px-3 py-2 border-top">
        <span class="text-muted small">Page {{ page() }} of {{ totalPages }}</span>
        <div class="d-flex gap-1"><button class="btn btn-sm btn-outline-secondary" [disabled]="page() === 1" (click)="changePage(page() - 1)"><i class="bi bi-chevron-left"></i></button><button class="btn btn-sm btn-outline-secondary" [disabled]="page() === totalPages" (click)="changePage(page() + 1)"><i class="bi bi-chevron-right"></i></button></div>
      </div>
    </div>
  </main>
</div>
