<app-navbar></app-navbar>
<div style="padding-top:var(--mb-navbar-height);display:flex">
  <app-sidebar></app-sidebar>
  <main class="main-content">
    <div class="page-header"><h2><i class="bi bi-people text-primary me-2"></i>Manage Users</h2><p>{{ total() }} total users</p></div>
    <div *ngIf="loading()" class="text-center py-5"><div class="spinner-border text-primary" style="width:3rem;height:3rem"></div></div>
    <div class="card border-0 shadow-sm" style="border-radius:12px" *ngIf="!loading()">
      <div class="table-responsive"><table class="table table-hover mb-0">
        <thead class="table-light"><tr><th>Name</th><th>Email</th><th>Role</th><th>Status</th><th>Joined</th><th>Actions</th></tr></thead>
        <tbody>
          <tr *ngFor="let u of users()">
            <td class="fw-semibold">{{ u.fullName }}</td><td class="text-muted small">{{ u.email }}</td>
            <td><span class="role-badge" [class]="u.role?.toLowerCase()">{{ u.role }}</span></td>
            <td><span class="badge rounded-pill" [class]="u.isDeleted ? 'bg-danger' : 'bg-success'">{{ u.isDeleted ? 'Disabled' : 'Active' }}</span></td>
            <td class="small text-muted">{{ u.createdAt | date:'MMM dd, yyyy' }}</td>
            <td><button class="btn btn-sm fw-semibold" [class]="u.isDeleted ? 'btn-outline-success' : 'btn-outline-danger'" (click)="toggleStatus(u)">{{ u.isDeleted ? 'Enable' : 'Disable' }}</button></td>
          </tr>
        </tbody>
      </table></div>
    </div>
  </main>
</div>
